<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Web Player IPTV - IPTV System</title>
    <link href="https://vjs.zencdn.net/8.0.2/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos do player */
        .player-page {
            background: #0a0a0a;
            min-height: 100vh;
        }
        
        .player-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .player-header h1 {
            font-size: 1.5em;
            color: #fff;
        }
        
        .back-btn {
            background: #2c3e50;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: #e67e22;
        }
        
        .video-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .video-js {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
        }
        
        .channel-info {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .channel-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #e67e22;
        }
        
        .category {
            color: #888;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-size: 1em;
        }
        
        .search-box input:focus {
            outline: none;
            background: #2a2a2a;
        }
        
        .categories {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }
        
        .category-btn {
            background: #2c3e50;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .category-btn.active {
            background: #e67e22;
        }
        
        .category-btn:hover {
            background: #e67e22;
        }
        
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }
        
        .channel-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .channel-card:hover {
            background: #2c3e50;
            transform: translateX(5px);
        }
        
        .channel-card.active {
            background: #e67e22;
        }
        
        .channel-card-logo {
            width: 50px;
            height: 50px;
            margin: 0 auto 8px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .channel-card-name {
            font-size: 0.85em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #888;
        }
        
        @media (max-width: 768px) {
            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .channel-card-name {
                font-size: 0.75em;
            }
        }
        
        .auth-warning {
            text-align: center;
            padding: 50px;
            background: rgba(0,0,0,0.8);
            border-radius: 12px;
        }
        
        .auth-warning .btn {
            margin-top: 20px;
        }
    </style>
</head>
<body class="player-page">
    <div class="player-container">
        <div class="player-header">
            <h1>📺 Web Player IPTV</h1>
            <a href="dashboard.html" class="back-btn">← Voltar ao Dashboard</a>
        </div>
        
        <div id="playerContent">
            <div class="loading">Carregando player...</div>
        </div>
    </div>
    
    <script src="https://vjs.zencdn.net/8.0.2/video.min.js"></script>
    <script>
        // Verificar autenticação
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        
        if (!token) {
            document.getElementById('playerContent').innerHTML = `
                <div class="auth-warning">
                    <h2>🔒 Acesso Restrito</h2>
                    <p>Você precisa estar logado para acessar o player.</p>
                    <a href="login.html" class="btn btn-primary">Fazer Login</a>
                </div>
            `;
        } else {
            loadPlayer();
        }
        
        async function loadPlayer() {
            const API_BASE = window.location.origin;
            let player = null;
            let allChannels = [];
            let currentCategory = 'all';
            let searchTerm = '';
            
            // Carregar canais da API
            async function loadChannels() {
                try {
                    const response = await fetch(`${API_BASE}/api/playlist`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error('Erro ao carregar playlist');
                    }
                    
                    const playlistText = await response.text();
                    allChannels = parseM3U(playlistText);
                    
                    renderCategories();
                    renderChannels();
                    initPlayer();
                    
                } catch (error) {
                    console.error('Erro:', error);
                    document.getElementById('playerContent').innerHTML = `
                        <div class="loading">❌ Erro ao carregar canais. Tente novamente mais tarde.</div>
                    `;
                }
            }
            
            // Parse M3U para JSON
            function parseM3U(content) {
                const channels = [];
                const lines = content.split('\n');
                let currentChannel = null;
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    if (line.startsWith('#EXTINF')) {
                        // Extrair atributos
                        const tvgIdMatch = line.match(/tvg-id="([^"]*)"/);
                        const tvgNameMatch = line.match(/tvg-name="([^"]*)"/);
                        const tvgLogoMatch = line.match(/tvg-logo="([^"]*)"/);
                        const groupMatch = line.match(/group-title="([^"]*)"/);
                        const nameMatch = line.match(/,(.*)$/);
                        
                        currentChannel = {
                            stream_id: channels.length + 1,
                            name: nameMatch ? nameMatch[1].trim() : 'Sem Nome',
                            tvg_id: tvgIdMatch ? tvgIdMatch[1] : '',
                            tvg_name: tvgNameMatch ? tvgNameMatch[1] : '',
                            tvg_logo: tvgLogoMatch ? tvgLogoMatch[1] : '',
                            category_name: groupMatch ? groupMatch[1] : 'Geral',
                            url: ''
                        };
                    } else if (line.startsWith('http') && currentChannel) {
                        currentChannel.url = line;
                        channels.push({...currentChannel});
                        currentChannel = null;
                    }
                }
                
                return channels;
            }
            
            // Extrair categorias únicas
            function getCategories() {
                const categories = new Set();
                allChannels.forEach(ch => {
                    if (ch.category_name) categories.add(ch.category_name);
                });
                return Array.from(categories).sort();
            }
            
            // Renderizar categorias
            function renderCategories() {
                const container = document.getElementById('categories');
                if (!container) return;
                
                container.innerHTML = '';
                
                const allBtn = document.createElement('button');
                allBtn.className = `category-btn ${currentCategory === 'all' ? 'active' : ''}`;
                allBtn.textContent = '📺 Todos';
                allBtn.onclick = () => {
                    currentCategory = 'all';
                    renderCategories();
                    renderChannels();
                };
                container.appendChild(allBtn);
                
                getCategories().forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = `category-btn ${currentCategory === cat ? 'active' : ''}`;
                    btn.textContent = cat;
                    btn.onclick = () => {
                        currentCategory = cat;
                        renderCategories();
                        renderChannels();
                    };
                    container.appendChild(btn);
                });
            }
            
            // Renderizar canais
            function renderChannels() {
                const container = document.getElementById('channels-container');
                if (!container) return;
                
                let filtered = allChannels;
                
                if (currentCategory !== 'all') {
                    filtered = filtered.filter(ch => ch.category_name === currentCategory);
                }
                
                if (searchTerm) {
                    filtered = filtered.filter(ch => 
                        ch.name.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                }
                
                if (filtered.length === 0) {
                    container.innerHTML = '<div class="loading">📭 Nenhum canal encontrado</div>';
                    return;
                }
                
                const grid = document.createElement('div');
                grid.className = 'channels-grid';
                
                filtered.forEach(channel => {
                    const card = document.createElement('div');
                    card.className = 'channel-card';
                    card.onclick = () => playChannel(channel);
                    
                    const logo = document.createElement('img');
                    logo.className = 'channel-card-logo';
                    logo.src = channel.tvg_logo || 'https://via.placeholder.com/50x50?text=TV';
                    logo.onerror = () => {
                        logo.src = 'https://via.placeholder.com/50x50?text=TV';
                    };
                    
                    const name = document.createElement('div');
                    name.className = 'channel-card-name';
                    name.textContent = channel.name;
                    
                    card.appendChild(logo);
                    card.appendChild(name);
                    grid.appendChild(card);
                });
                
                container.innerHTML = '';
                container.appendChild(grid);
            }
            
            // Reproduzir canal
            function playChannel(channel) {
                if (!player) {
                    initPlayer();
                }
                
                player.src({ src: channel.url, type: 'application/x-mpegURL' });
                player.play();
                
                document.getElementById('current-channel-name').textContent = channel.name;
                document.getElementById('current-category').textContent = channel.category_name;
                document.getElementById('channel-info').style.display = 'block';
            }
            
            // Inicializar player
            function initPlayer() {
                if (!player) {
                    player = videojs('video-player', {
                        autoplay: true,
                        controls: true,
                        preload: 'auto',
                        html5: {
                            vhs: { overrideNative: true },
                            nativeAudioTracks: false,
                            nativeVideoTracks: false
                        }
                    });
                }
            }
            
            // Montar HTML
            document.getElementById('playerContent').innerHTML = `
                <div class="video-wrapper">
                    <video id="video-player" class="video-js vjs-default-skin" controls preload="auto">
                        <p class="vjs-no-js">Para assistir ative o JavaScript</p>
                    </video>
                </div>
                
                <div class="channel-info" id="channel-info" style="display: none;">
                    <div class="channel-name" id="current-channel-name">Nenhum canal selecionado</div>
                    <div class="category" id="current-category">-</div>
                </div>
                
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="🔍 Buscar canal...">
                </div>
                
                <div class="categories" id="categories"></div>
                
                <div id="channels-container">
                    <div class="loading">Carregando canais...</div>
                </div>
            `;
            
            // Adicionar evento de busca
            document.getElementById('search-input').addEventListener('input', (e) => {
                searchTerm = e.target.value;
                renderChannels();
            });
            
            // Carregar canais
            loadChannels();
        }
    </script>
</body>
</html>
